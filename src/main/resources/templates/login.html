<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TelecomApp | Ingreso</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<main class="login-wrap">
    <section class="login-shell">
        <article class="login-hero">
            <h1>TelecomApp</h1>
            <p>Panel profesional para la operacion comercial y tecnica. Gestiona clientes, planes, contratos y facturas en un solo flujo.</p>
        </article>

        <article class="login-card">
            <h2>Iniciar sesion</h2>
            <p>Ingresa tus credenciales para continuar.</p>

            <form th:action="@{/login}" method="post" class="form-stack mt-14">
                <div>
                    <label for="username">Usuario</label>
                    <input id="username" name="username" type="text" autocomplete="username" required>
                </div>

                <div>
                    <label for="password">Clave</label>
                    <input id="password" name="password" type="password" autocomplete="current-password" required>
                </div>

                <div class="actions mt-4">
                    <button class="btn-primary" type="submit">Ingresar</button>
                </div>
            </form>

            <p class="notice error" th:if="${param.error}">Usuario o clave incorrectos.</p>
            <p class="notice success" th:if="${param.logout}">Sesion cerrada correctamente.</p>
        </article>
    </section>
</main>
</body>
</html>
