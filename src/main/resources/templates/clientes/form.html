<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cliente | TelecomApp</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<main class="page">
    <header class="topbar">
        <div class="brand">
            <h1 th:text="${cliente.idCliente} == null ? 'Nuevo Cliente' : 'Editar Cliente'"></h1>
            <p>Información de contacto y ubicación del cliente</p>
        </div>
        <a class="btn btn-link" th:href="@{/clientes}">Volver</a>
    </header>

    <section class="card" style="max-width: 700px;">
        <form th:action="@{/clientes}" method="post" th:object="${cliente}">
            <input type="hidden" th:field="*{idCliente}">

            <label for="nombre">Nombre</label>
            <input id="nombre" th:field="*{nombre}" required>

            <label for="direccion">Dirección</label>
            <input id="direccion" th:field="*{direccion}" required>

            <label for="telefono">Teléfono</label>
            <input id="telefono" th:field="*{telefono}" required>

            <div class="actions" style="margin-top: 16px;">
                <button class="btn-primary" type="submit">Guardar</button>
                <a class="btn btn-link" th:href="@{/clientes}">Cancelar</a>
            </div>
        </form>
    </section>
</main>
</body>
</html>
