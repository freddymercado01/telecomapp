<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cliente | TelecomApp</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="layout">
    <aside th:replace="~{fragments/sidebar :: appSidebar('clientes')}"></aside>

    <main class="content">
        <section class="page stack-lg">
            <header class="page-header">
                <div class="brand">
                    <h1 th:text="${cliente.idCliente} == null ? 'Nuevo cliente' : 'Editar cliente'"></h1>
                    <p>Informacion de contacto y ubicacion del cliente.</p>
                </div>
                <a class="btn btn-link" th:href="@{/clientes}">Volver</a>
            </header>

            <section class="card card-sm">
                <form th:action="@{/clientes}" method="post" th:object="${cliente}" class="form-stack">
                    <input type="hidden" th:field="*{idCliente}">

                    <div class="form-grid">
                        <div>
                            <label for="nombre">Nombre</label>
                            <input id="nombre" th:field="*{nombre}" required>
                        </div>

                        <div>
                            <label for="telefono">Telefono</label>
                            <input id="telefono" th:field="*{telefono}" required>
                        </div>
                    </div>

                    <div>
                        <label for="direccion">Direccion</label>
                        <input id="direccion" th:field="*{direccion}" required>
                    </div>

                    <div class="actions mt-4">
                        <button class="btn-primary" type="submit">Guardar</button>
                        <a class="btn btn-link" th:href="@{/clientes}">Cancelar</a>
                    </div>
                </form>
            </section>
        </section>
    </main>
</div>
</body>
</html>
