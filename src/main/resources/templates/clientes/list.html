<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clientes | TelecomApp</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="layout">
    <aside th:replace="~{fragments/sidebar :: appSidebar('clientes')}"></aside>

    <main class="content">
        <section class="page stack-lg">
            <header class="page-header">
                <div class="brand">
                    <h1>Clientes</h1>
                    <p>Gestion de clientes residenciales y corporativos.</p>
                </div>
                <div class="actions">
                    <a class="btn btn-primary" th:href="@{/clientes/nuevo}">Nuevo cliente</a>
                </div>
            </header>

            <section class="card table-wrap">
                <table class="app-table">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Direccion</th>
                        <th>Telefono</th>
                        <th>Acciones</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${#lists.isEmpty(clientes)}">
                        <td class="empty-row" colspan="5">No hay clientes registrados aun.</td>
                    </tr>
                    <tr th:each="c : ${clientes}">
                        <td th:text="${c.idCliente}"></td>
                        <td th:text="${c.nombre}"></td>
                        <td th:text="${c.direccion}"></td>
                        <td th:text="${c.telefono}"></td>
                        <td>
                            <div class="actions">
                                <a class="btn btn-link" th:href="@{'/clientes/' + ${c.idCliente} + '/editar'}">Editar</a>
                                <form th:action="@{'/clientes/' + ${c.idCliente} + '/eliminar'}" method="post">
                                    <button type="submit" class="btn-danger">Eliminar</button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </section>
        </section>
    </main>
</div>
</body>
</html>
