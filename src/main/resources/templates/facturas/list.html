<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facturas | TelecomApp</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="layout">
    <aside th:replace="~{fragments/sidebar :: appSidebar('facturas')}"></aside>

    <main class="content">
        <section class="page stack-lg">
            <header class="page-header">
                <div class="brand">
                    <h1>Facturas</h1>
                    <p>Generacion y seguimiento del estado de facturacion.</p>
                </div>
            </header>

            <section class="card card-xs">
                <h3 class="section-title">Generar factura</h3>
                <form th:action="@{/facturas/generar}" method="post" class="form-stack">
                    <div>
                        <label for="contratoId">Contrato</label>
                        <select id="contratoId" name="contratoId" required>
                            <option value="" disabled selected>Seleccione un contrato</option>
                            <option th:each="c : ${contratos}"
                                    th:value="${c.idContrato}"
                                    th:text="${'Contrato ' + c.idContrato + ' - ' + c.cliente.nombre + ' - ' + c.plan.nombre}">
                            </option>
                        </select>
                    </div>

                    <div class="actions">
                        <button type="submit" class="btn-primary">Generar</button>
                    </div>
                </form>
            </section>

            <section class="card table-wrap">
                <table class="app-table">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Contrato</th>
                        <th>Cliente</th>
                        <th>Fecha emision</th>
                        <th>Total</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${#lists.isEmpty(facturas)}">
                        <td class="empty-row" colspan="7">No hay facturas registradas aun.</td>
                    </tr>
                    <tr th:each="f : ${facturas}">
                        <td th:text="${f.idFactura}"></td>
                        <td th:text="${f.contrato.idContrato}"></td>
                        <td th:text="${f.contrato.cliente.nombre}"></td>
                        <td th:text="${f.fechaEmision}"></td>
                        <td th:text="${#numbers.formatDecimal(f.total, 1, 'POINT', 2, 'COMMA')}"></td>
                        <td>
                            <span class="status-chip" th:classappend="${f.estado.name() == 'PAGADA'} ? ' status-active' : ' status-inactive'" th:text="${f.estado}"></span>
                        </td>
                        <td>
                            <div class="actions">
                                <form th:action="@{'/facturas/' + ${f.idFactura} + '/estado'}" method="post" class="actions">
                                    <select name="estado" class="select-compact">
                                        <option th:each="e : ${estados}"
                                                th:value="${e}"
                                                th:text="${e}"
                                                th:selected="${e == f.estado}">
                                        </option>
                                    </select>
                                    <button type="submit">Actualizar</button>
                                </form>

                                <form th:action="@{'/facturas/' + ${f.idFactura} + '/eliminar'}" method="post">
                                    <button type="submit" class="btn-danger">Eliminar</button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </section>
        </section>
    </main>
</div>
</body>
</html>
