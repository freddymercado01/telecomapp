<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facturas | TelecomApp</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="layout">
    <aside class="sidebar">
        <h2>TelecomApp</h2>
        <p>Panel operativo</p>
        <nav class="side-nav">
            <a th:href="@{/dashboard}">Dashboard</a>
            <a th:href="@{/clientes}">Clientes</a>
            <a th:href="@{/planes}">Planes</a>
            <a th:href="@{/contratos}">Contratos</a>
            <a class="active" th:href="@{/facturas}">Facturas</a>
            <a th:href="@{/logout}">Salir</a>
        </nav>
    </aside>

    <main class="content">
        <section class="page" style="padding-top:0;">
            <header class="topbar">
                <div class="brand">
                    <h1>Facturas</h1>
                    <p>Generación y seguimiento del estado de facturación</p>
                </div>
            </header>

            <section class="card" style="max-width: 720px; margin-bottom: 16px;">
                <h3 style="margin-top:0;">Generar factura</h3>
                <form th:action="@{/facturas/generar}" method="post">
                    <label for="contratoId">Contrato</label>
                    <select id="contratoId" name="contratoId" required>
                        <option value="" disabled selected>Seleccione un contrato</option>
                        <option th:each="c : ${contratos}"
                                th:value="${c.idContrato}"
                                th:text="${'Contrato ' + c.idContrato + ' - ' + c.cliente.nombre + ' - ' + c.plan.nombre}">
                        </option>
                    </select>

                    <div class="actions" style="margin-top: 14px;">
                        <button type="submit" class="btn-primary">Generar</button>
                    </div>
                </form>
            </section>

            <section class="card">
                <table border="1" cellpadding="8" cellspacing="0" style="width:100%; border-collapse: collapse; border-color: #d9e2ec;">
                    <thead style="background:#f8fafc;">
                    <tr>
                        <th>ID</th>
                        <th>Contrato</th>
                        <th>Cliente</th>
                        <th>Fecha emisión</th>
                        <th>Total</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${#lists.isEmpty(facturas)}">
                        <td colspan="7" style="text-align:center; color:#5a6b7b;">No hay facturas registradas aún.</td>
                    </tr>
                    <tr th:each="f : ${facturas}">
                        <td th:text="${f.idFactura}"></td>
                        <td th:text="${f.contrato.idContrato}"></td>
                        <td th:text="${f.contrato.cliente.nombre}"></td>
                        <td th:text="${f.fechaEmision}"></td>
                        <td th:text="${#numbers.formatDecimal(f.total, 1, 'POINT', 2, 'COMMA')}"></td>
                        <td th:text="${f.estado}"></td>
                        <td>
                            <div class="actions">
                                <form th:action="@{'/facturas/' + ${f.idFactura} + '/estado'}" method="post" style="display:inline;">
                                    <select name="estado" style="min-width: 140px;">
                                        <option th:each="e : ${estados}"
                                                th:value="${e}"
                                                th:text="${e}"
                                                th:selected="${e == f.estado}">
                                        </option>
                                    </select>
                                    <button type="submit">Actualizar</button>
                                </form>

                                <form th:action="@{'/facturas/' + ${f.idFactura} + '/eliminar'}" method="post" style="display:inline;">
                                    <button type="submit">Eliminar</button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </section>
        </section>
    </main>
</div>
</body>
</html>
