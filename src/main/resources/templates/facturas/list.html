<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Facturas</title></head>
<body>
<h2>Facturas</h2>
<a th:href="@{/dashboard}">Volver</a>

<h3>Generar factura</h3>
<form th:action="@{/facturas/generar}" method="post">
    <label>Contrato:</label>
    <select name="contratoId" required>
        <option th:each="c : ${contratos}" th:value="${c.idContrato}"
                th:text="${'Contrato ' + c.idContrato + ' - ' + c.cliente.nombre + ' - ' + c.plan.nombre}">
        </option>
    </select>
    <button type="submit">Generar</button>
</form>

<hr>

<table border="1" cellpadding="6">
    <tr>
        <th>ID</th><th>Contrato</th><th>Cliente</th><th>Fecha</th><th>Total</th><th>Estado</th><th>Acciones</th>
    </tr>
    <tr th:each="f : ${facturas}">
        <td th:text="${f.idFactura}"></td>
        <td th:text="${f.contrato.idContrato}"></td>
        <td th:text="${f.contrato.cliente.nombre}"></td>
        <td th:text="${f.fechaEmision}"></td>
        <td th:text="${f.total}"></td>
        <td th:text="${f.estado}"></td>
        <td>
            <form th:action="@{'/facturas/' + ${f.idFactura} + '/estado'}" method="post" style="display:inline;">
                <select name="estado">
                    <option th:each="e : ${estados}" th:value="${e}" th:text="${e}"
                            th:selected="${e == f.estado}"></option>
                </select>
                <button type="submit">Actualizar</button>
            </form>

            <form th:action="@{'/facturas/' + ${f.idFactura} + '/eliminar'}" method="post" style="display:inline;">
                <button type="submit">Eliminar</button>
            </form>
        </td>
    </tr>
</table>
</body>
</html>
