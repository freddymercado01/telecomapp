<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Contrato</title></head>
<body>
<h2 th:text="${contrato.idContrato} == null ? 'Nuevo Contrato' : 'Editar Contrato'"></h2>
<a th:href="@{/contratos}">Volver</a>

<form th:action="@{/contratos}" method="post" th:object="${contrato}">
    <input type="hidden" th:field="*{idContrato}"/>

    <label>Cliente:</label>
    <select name="clienteId" required>
        <option th:each="cl : ${clientes}" th:value="${cl.idCliente}" th:text="${cl.nombre}"
                th:selected="${contrato.cliente != null and contrato.cliente.idCliente == cl.idCliente}"></option>
    </select><br><br>

    <label>Plan:</label>
    <select name="planId" required>
        <option th:each="p : ${planes}" th:value="${p.idPlan}" th:text="${p.nombre}"
                th:selected="${contrato.plan != null and contrato.plan.idPlan == p.idPlan}"></option>
    </select><br><br>

    <label>Vendedor:</label>
    <select name="vendedorId" required>
        <option th:each="v : ${vendedores}" th:value="${v.idVendedor}" th:text="${v.nombre}"
                th:selected="${contrato.vendedor != null and contrato.vendedor.idVendedor == v.idVendedor}"></option>
    </select><br><br>

    <label>Fecha inicio:</label>
    <input type="date" th:field="*{fechaInicio}" required/><br><br>

    <label>Fecha fin:</label>
    <input type="date" th:field="*{fechaFin}"/><br><br>

    <label>Estado:</label>
    <select th:field="*{estado}">
        <option th:each="e : ${estados}" th:value="${e}" th:text="${e}"></option>
    </select><br><br>

    <h3>Infraestructura</h3>
    <label>Dirección instalación:</label>
    <input th:field="*{infraestructura.direccionInstalacion}"/><br><br>

    <label>Nodo:</label>
    <input th:field="*{infraestructura.nodo}"/><br><br>

    <label>Equipo CPE:</label>
    <input th:field="*{infraestructura.equipoCPE}"/><br><br>

    <label>Serial ONT:</label>
    <input th:field="*{infraestructura.serialONT}"/><br><br>

    <label>IP WAN:</label>
    <input th:field="*{infraestructura.ipWan}"/><br><br>

    <label>Observaciones:</label><br>
    <textarea th:field="*{infraestructura.observaciones}" rows="3" cols="40"></textarea><br><br>

    <button type="submit">Guardar</button>
</form>
</body>
</html>
