<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contratos | TelecomApp</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="layout">
    <aside class="sidebar">
        <h2>TelecomApp</h2>
        <p>Panel operativo</p>
        <nav class="side-nav">
            <a th:href="@{/dashboard}">Dashboard</a>
            <a th:href="@{/clientes}">Clientes</a>
            <a th:href="@{/planes}">Planes</a>
            <a class="active" th:href="@{/contratos}">Contratos</a>
            <a th:href="@{/facturas}">Facturas</a>
            <a th:href="@{/logout}">Salir</a>
        </nav>
    </aside>

    <main class="content">
        <section class="page" style="padding-top:0;">
            <header class="topbar">
                <div class="brand">
                    <h1>Contratos</h1>
                    <p>Gestión de contratos y estado operativo del servicio</p>
                </div>
                <div class="actions">
                    <a class="btn btn-primary" th:href="@{/contratos/nuevo}">Nuevo contrato</a>
                </div>
            </header>

            <section class="card">
                <table border="1" cellpadding="8" cellspacing="0" style="width:100%; border-collapse: collapse; border-color: #d9e2ec;">
                    <thead style="background:#f8fafc;">
                    <tr>
                        <th>ID</th>
                        <th>Cliente</th>
                        <th>Plan</th>
                        <th>Vendedor</th>
                        <th>Inicio</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${#lists.isEmpty(contratos)}">
                        <td colspan="7" style="text-align:center; color:#5a6b7b;">No hay contratos registrados aún.</td>
                    </tr>
                    <tr th:each="c : ${contratos}">
                        <td th:text="${c.idContrato}"></td>
                        <td th:text="${c.cliente.nombre}"></td>
                        <td th:text="${c.plan.nombre}"></td>
                        <td th:text="${c.vendedor.nombre}"></td>
                        <td th:text="${c.fechaInicio}"></td>
                        <td th:text="${c.estado}"></td>
                        <td>
                            <div class="actions">
                                <a class="btn btn-link" th:href="@{'/contratos/' + ${c.idContrato} + '/editar'}">Editar</a>
                                <form th:action="@{'/contratos/' + ${c.idContrato} + '/eliminar'}" method="post" style="display:inline;">
                                    <button type="submit">Eliminar</button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </section>
        </section>
    </main>
</div>
</body>
</html>
