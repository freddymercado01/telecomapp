<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contratos | TelecomApp</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="layout">
    <aside th:replace="~{fragments/sidebar :: appSidebar('contratos')}"></aside>

    <main class="content">
        <section class="page stack-lg">
            <header class="page-header">
                <div class="brand">
                    <h1>Contratos</h1>
                    <p>Gestion de contratos y estado operativo del servicio.</p>
                </div>
                <div class="actions">
                    <a class="btn btn-primary" th:href="@{/contratos/nuevo}">Nuevo contrato</a>
                </div>
            </header>

            <section class="card table-wrap">
                <table class="app-table">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Cliente</th>
                        <th>Plan</th>
                        <th>Vendedor</th>
                        <th>Inicio</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${#lists.isEmpty(contratos)}">
                        <td class="empty-row" colspan="7">No hay contratos registrados aun.</td>
                    </tr>
                    <tr th:each="c : ${contratos}">
                        <td th:text="${c.idContrato}"></td>
                        <td th:text="${c.cliente.nombre}"></td>
                        <td th:text="${c.plan.nombre}"></td>
                        <td th:text="${c.vendedor.nombre}"></td>
                        <td th:text="${c.fechaInicio}"></td>
                        <td>
                            <span class="status-chip" th:classappend="${c.estado.name() == 'ACTIVO'} ? ' status-active' : ' status-inactive'" th:text="${c.estado}"></span>
                        </td>
                        <td>
                            <div class="actions">
                                <a class="btn btn-link" th:href="@{'/contratos/' + ${c.idContrato} + '/editar'}">Editar</a>
                                <form th:action="@{'/contratos/' + ${c.idContrato} + '/eliminar'}" method="post">
                                    <button type="submit" class="btn-danger">Eliminar</button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </section>
        </section>
    </main>
</div>
</body>
</html>
