<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Plan</title></head>
<body>
<h2 th:text="${plan.idPlan} == null ? 'Nuevo Plan' : 'Editar Plan'"></h2>
<a th:href="@{/planes}">Volver</a>

<form th:action="@{/planes}" method="post" th:object="${plan}">
    <input type="hidden" th:field="*{idPlan}"/>

    <label>Nombre:</label>
    <input th:field="*{nombre}" required/><br><br>

    <label>Tipo servicio:</label>
    <input th:field="*{tipoServicio}" placeholder="Voz / Conectividad" required/><br><br>

    <label>Precio mensual:</label>
    <input type="number" step="0.01" th:field="*{precioMensual}" required/><br><br>

    <label>Descripción:</label><br>
    <textarea th:field="*{descripcion}" rows="3" cols="40"></textarea><br><br>

    <label>Activo:</label>
    <input type="checkbox" th:field="*{activo}"/><br><br>

    <button type="submit">Guardar</button>
</form>
</body>
</html>l>
