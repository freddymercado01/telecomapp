<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plan | TelecomApp</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="layout">
    <aside th:replace="~{fragments/sidebar :: appSidebar('planes')}"></aside>

    <main class="content">
        <section class="page stack-lg">
            <header class="page-header">
                <div class="brand">
                    <h1 th:text="${plan.idPlan} == null ? 'Nuevo plan' : 'Editar plan'"></h1>
                    <p>Configuracion comercial del plan de telecomunicaciones.</p>
                </div>
                <a class="btn btn-link" th:href="@{/planes}">Volver</a>
            </header>

            <section class="card card-md">
                <form th:action="@{/planes}" method="post" th:object="${plan}" class="form-stack">
                    <input type="hidden" th:field="*{idPlan}">

                    <div class="form-grid">
                        <div>
                            <label for="nombre">Nombre</label>
                            <input id="nombre" th:field="*{nombre}" required>
                        </div>

                        <div>
                            <label for="tipoServicio">Tipo de servicio</label>
                            <input id="tipoServicio" th:field="*{tipoServicio}" placeholder="Internet, Voz, TV, Movil..." required>
                        </div>
                    </div>

                    <div class="form-grid">
                        <div>
                            <label for="precioMensual">Precio mensual</label>
                            <input id="precioMensual" type="number" min="0" step="0.01" th:field="*{precioMensual}" required>
                        </div>

                        <div>
                            <label for="activo">Activo</label>
                            <select id="activo" th:field="*{activo}">
                                <option th:value="true">Si</option>
                                <option th:value="false">No</option>
                            </select>
                        </div>
                    </div>

                    <div>
                        <label for="descripcion">Descripcion</label>
                        <textarea id="descripcion" th:field="*{descripcion}" rows="4" placeholder="Detalles del plan, beneficios, velocidad, etc."></textarea>
                    </div>

                    <div class="actions mt-4">
                        <button class="btn-primary" type="submit">Guardar</button>
                        <a class="btn btn-link" th:href="@{/planes}">Cancelar</a>
                    </div>
                </form>
            </section>
        </section>
    </main>
</div>
</body>
</html>
