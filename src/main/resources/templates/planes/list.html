<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planes | TelecomApp</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="layout">
    <aside th:replace="~{fragments/sidebar :: appSidebar('planes')}"></aside>

    <main class="content">
        <section class="page stack-lg">
            <header class="page-header">
                <div class="brand">
                    <h1>Planes</h1>
                    <p>Gestion del catalogo comercial de servicios.</p>
                </div>
                <div class="actions">
                    <a class="btn btn-primary" th:href="@{/planes/nuevo}">Nuevo plan</a>
                </div>
            </header>

            <section class="card table-wrap">
                <table class="app-table">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Tipo servicio</th>
                        <th>Precio mensual</th>
                        <th>Activo</th>
                        <th>Acciones</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${#lists.isEmpty(planes)}">
                        <td class="empty-row" colspan="6">No hay planes registrados aun.</td>
                    </tr>
                    <tr th:each="p : ${planes}">
                        <td th:text="${p.idPlan}"></td>
                        <td th:text="${p.nombre}"></td>
                        <td th:text="${p.tipoServicio}"></td>
                        <td th:text="${#numbers.formatDecimal(p.precioMensual, 1, 'POINT', 2, 'COMMA')}"></td>
                        <td>
                            <span class="status-chip" th:classappend="${p.activo} ? ' status-active' : ' status-inactive'" th:text="${p.activo} ? 'Si' : 'No'"></span>
                        </td>
                        <td>
                            <div class="actions">
                                <a class="btn btn-link" th:href="@{'/planes/' + ${p.idPlan} + '/editar'}">Editar</a>

                                <form th:action="@{'/planes/' + ${p.idPlan} + '/toggle'}" method="post">
                                    <button type="submit" th:text="${p.activo} ? 'Desactivar' : 'Activar'"></button>
                                </form>

                                <form th:action="@{'/planes/' + ${p.idPlan} + '/eliminar'}" method="post">
                                    <button type="submit" class="btn-danger">Eliminar</button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </section>
        </section>
    </main>
</div>
</body>
</html>
