<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Planes</title></head>
<body>
<h2>Planes</h2>
<a th:href="@{/dashboard}">Volver</a> | <a th:href="@{/planes/nuevo}">Nuevo plan</a>

<table border="1" cellpadding="6">
    <tr>
        <th>ID</th><th>Nombre</th><th>Tipo</th><th>Precio</th><th>Activo</th><th>Acciones</th>
    </tr>
    <tr th:each="p : ${planes}">
        <td th:text="${p.idPlan}"></td>
        <td th:text="${p.nombre}"></td>
        <td th:text="${p.tipoServicio}"></td>
        <td th:text="${p.precioMensual}"></td>
        <td th:text="${p.activo}"></td>
        <td>
            <a th:href="@{'/planes/' + ${p.idPlan} + '/editar'}">Editar</a>

            <form th:action="@{'/planes/' + ${p.idPlan} + '/toggle'}" method="post" style="display:inline;">
                <button type="submit" th:text="${p.activo} ? 'Desactivar' : 'Activar'"></button>
            </form>

            <form th:action="@{'/planes/' + ${p.idPlan} + '/eliminar'}" method="post" style="display:inline;">
                <button type="submit">Eliminar</button>
            </form>
        </td>
    </tr>
</table>
</body>
</html>
